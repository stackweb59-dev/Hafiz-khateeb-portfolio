<!-- Center AI Hologram -->
<div class="absolute left-1/2 top-1/2 z-20 -translate-x-1/2 -translate-y-1/2">

  <div class="relative flex items-center justify-center w-[420px] h-[420px]">

    <!-- Outer Glow -->
    <div class="absolute w-[420px] h-[420px] rounded-full
    bg-cyan-400/10 blur-3xl animate-pulse"></div>

    <!-- Outer Ring -->
    <div class="absolute w-[360px] h-[360px] rounded-full
    border border-cyan-400/40 animate-[spin_30s_linear_infinite]"></div>

    <!-- Second Ring -->
    <div class="absolute w-[330px] h-[330px] rounded-full
    border-[12px] border-cyan-400/20 animate-[spin_18s_linear_infinite_reverse]"></div>

    <!-- Third Ring -->
    <div class="absolute w-[290px] h-[290px] rounded-full
    border-[8px] border-cyan-300/60 animate-[spin_15s_linear_infinite]"></div>

    <!-- Dashed Ring -->
    <div class="absolute w-[255px] h-[255px] rounded-full
    border-2 border-dashed border-cyan-300/50 animate-[spin_12s_linear_infinite]"></div>

    <!-- Small Arc -->
    <div class="absolute w-[310px] h-[310px] rounded-full border-[10px]
    border-transparent border-t-cyan-300 border-r-cyan-400
    animate-[spin_8s_linear_infinite]"></div>

    <!-- Glow Circle -->
    <div class="absolute w-[250px] h-[250px] rounded-full
    bg-cyan-500/20 blur-xl"></div>

    <!-- Inner Circle -->
    <div class="absolute w-[210px] h-[210px] rounded-full
    bg-[#07182f] border border-cyan-400/40"></div>

    <!-- Center Glow -->
    <div class="absolute w-32 h-32 rounded-full
    bg-cyan-400/20 blur-2xl animate-pulse"></div>

    <!-- Floating Dots -->
    <span class="absolute top-10 left-20 w-2 h-2 rounded-full bg-cyan-300 animate-ping"></span>
    <span class="absolute bottom-20 right-10 w-2 h-2 rounded-full bg-cyan-400 animate-ping"></span>
    <span class="absolute left-5 top-1/2 w-1.5 h-1.5 rounded-full bg-cyan-200 animate-pulse"></span>
    <span class="absolute right-8 top-24 w-2 h-2 rounded-full bg-cyan-300 animate-ping"></span>

    <!-- Horizontal Scan -->
    <div class="absolute w-[240px] h-[2px]
    bg-cyan-300 blur-sm animate-pulse"></div>

  </div>

</div>
